<!DOCTYPE html>
<html>
<head>
  <title>BlitzBet</title>
</head>
<body style="background:#0f0f0f;color:white;font-family:sans-serif;text-align:center">

<h1>🎰 BlitzBet</h1>

<h2 id="balance">$0.00</h2>

<input id="bet" placeholder="Bet $" />

<br><br>

<button onclick="playDice()">🎲 Dice</button>
<button onclick="playMines()">💣 Mines</button>

<p id="result"></p>

<script>
const API = "https://blit-production.up.railway.app";

const params = new URLSearchParams(window.location.search);
const userId = Number(params.get("id"));

if (!userId) {
  document.body.innerHTML = "No user ID provided 💀";
}

/* ================= LOAD BALANCE ================= */

async function loadBalance() {
  const res = await fetch(API + "/user/" + userId);
  const data = await res.json();

  if (data.error) return;

  document.getElementById("balance").innerText =
    "$" + data.balanceUSD.toFixed(2);
}

/* ================= DICE ================= */

async function playDice() {
  const bet = Number(document.getElementById("bet").value);

  if (!bet || bet <= 0) return alert("Invalid bet");

  const res = await fetch(API + "/dice", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, bet })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("result").innerText = "❌ Invalid bet";
    return;
  }

  document.getElementById("result").innerText =
    data.win ? "🔥 You won!" : "💀 You lost";

  loadBalance();
}

/* ================= MINES ================= */

async function playMines() {
  const bet = Number(document.getElementById("bet").value);

  if (!bet || bet <= 0) return alert("Invalid bet");

  const res = await fetch(API + "/mines", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, bet })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("result").innerText = "❌ Invalid bet";
    return;
  }

  document.getElementById("result").innerText =
    data.hitMine ? "💀 Boom!" : "🔥 Safe!";

  loadBalance();
}

/* ================= INIT ================= */

loadBalance();
</script>

</body>
</html>
