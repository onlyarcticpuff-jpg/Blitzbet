<!DOCTYPE html>
<html>
<head>
  <title>BlitzBet</title>
</head>

<body style="background:#0b0b0f;color:white;font-family:sans-serif;text-align:center">

<h1>⚡ BlitzBet</h1>

<h2 id="balance">$0.00</h2>

<input id="bet" placeholder="Bet $" />

<br><br>

<label>Win Chance: <span id="chanceVal">50</span>%</label><br>
<input type="range" min="1" max="95" value="50" id="chance">

<br><br>

<button onclick="rollDice()">🎲 Roll</button>

<h3 id="result"></h3>

<script>
const API = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

const chanceSlider = document.getElementById("chance");
const chanceVal = document.getElementById("chanceVal");

chanceSlider.oninput = () => {
  chanceVal.innerText = chanceSlider.value;
};

async function loadBalance() {
  const res = await fetch(API + "/user/" + userId);
  const data = await res.json();
  document.getElementById("balance").innerText =
    "$" + data.balanceUSD.toFixed(2);
}

async function rollDice() {
  const bet = Number(document.getElementById("bet").value);
  const chance = Number(chanceSlider.value);

  document.getElementById("result").innerText = "🎲 Rolling...";

  await new Promise(r => setTimeout(r, 600)); // animation delay

  const res = await fetch(API + "/dice", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, bet, chance })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("result").innerText = "❌ Error";
    return;
  }

  document.getElementById("result").innerText =
    `Roll: ${data.roll} → ${data.win ? "🔥 WIN" : "💀 LOSE"}`;

  loadBalance();
}

loadBalance();
</script>

</body>
</html>
