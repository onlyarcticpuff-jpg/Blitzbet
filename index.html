<!DOCTYPE html>
<html>
<head>
  <title>BlitzBet</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    #balance {
      font-size: 26px;
      margin: 10px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin: 20px;
      gap: 10px;
    }

    .tab {
      padding: 10px 20px;
      background: #1a1d26;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #2f80ed;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      width: 200px;
      margin: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2f80ed;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: 60px;
      height: 60px;
      background: #1a1d26;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .safe { background: #27ae60; }
    .mine { background: #eb5757; }
  </style>
</head>

<body>

<h1>⚡ BlitzBet</h1>
<div id="balance">$0.00</div>

<div class="tabs">
  <div class="tab active" onclick="switchGame('dice')">🎲 Dice</div>
  <div class="tab" onclick="switchGame('mines')">💣 Mines</div>
</div>

<div id="diceUI">
  <input id="bet" placeholder="Bet $" />

  <br>

  <label>Chance: <span id="chanceVal">50</span>%</label><br>
  <input type="range" min="1" max="95" value="50" id="chance">

  <br>

  <button onclick="rollDice()">Roll</button>
  <div id="diceResult"></div>
</div>

<div id="minesUI" style="display:none">
  <input id="minesBet" placeholder="Bet $" />
  <input id="mineCount" placeholder="Mines (1-10)" />

  <br>
  <button onclick="startMines()">Start Game</button>
  <button onclick="cashout()">Cashout</button>

  <div id="grid"></div>
</div>

<script>
const API = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

let currentGame = "dice";

function switchGame(game) {
  currentGame = game;

  document.getElementById("diceUI").style.display = game === "dice" ? "block" : "none";
  document.getElementById("minesUI").style.display = game === "mines" ? "block" : "none";
}

async function loadBalance() {
  const res = await fetch(API + "/user/" + userId);
  const data = await res.json();
  document.getElementById("balance").innerText =
    "$" + data.balanceUSD.toFixed(2);
}

/* ================= DICE ================= */

const slider = document.getElementById("chance");
const val = document.getElementById("chanceVal");

slider.oninput = () => val.innerText = slider.value;

async function rollDice() {
  const bet = Number(document.getElementById("bet").value);
  const chance = Number(slider.value);

  document.getElementById("diceResult").innerText = "Rolling...";

  await new Promise(r => setTimeout(r, 500));

  const res = await fetch(API + "/dice", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id: userId, bet, chance })
  });

  const data = await res.json();

  document.getElementById("diceResult").innerText =
    data.win ? "🔥 WIN " + data.roll : "💀 LOSE " + data.roll;

  loadBalance();
}

/* ================= MINES ================= */

let gameActive = false;

async function startMines() {
  const bet = Number(document.getElementById("minesBet").value);
  const mines = Number(document.getElementById("mineCount").value);

  await fetch(API + "/mines/start", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id: userId, bet, mines })
  });

  gameActive = true;
  createGrid();
}

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 25; i++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.onclick = () => clickTile(i, tile);
    grid.appendChild(tile);
  }
}

async function clickTile(index, el) {
  if (!gameActive) return;

  const res = await fetch(API + "/mines/click", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id: userId, tile: index })
  });

  const data = await res.json();

  if (data.lose) {
    el.classList.add("mine");
    gameActive = false;
  } else {
    el.classList.add("safe");
  }
}

async function cashout() {
  const res = await fetch(API + "/mines/cashout", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id: userId })
  });

  gameActive = false;
  loadBalance();
}

loadBalance();
</script>

</body>
</html>
