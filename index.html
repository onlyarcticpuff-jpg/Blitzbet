<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlitzBet</title>

<style>
body {
  margin:0;
  background:#0f1117;
  color:white;
  font-family:sans-serif;
}

.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#151823;
}

.card {
  background:#1a1d26;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

#game {
  display:none;
  padding:20px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#6c5ce7;
  color:white;
  cursor:pointer;
}

input {
  padding:10px;
  border-radius:6px;
  border:none;
  margin:5px;
}

#grid {
  display:grid;
  grid-template-columns:repeat(5,60px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.tile {
  width:60px;
  height:60px;
  background:#1a1d26;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

img { width:30px; }
</style>
</head>

<body>

<div class="topbar">
  <b>⚡ BlitzBet</b>
  <div id="balance">$0.00</div>
</div>

<div id="home" class="grid">

  <div class="card" onclick="openGame('dice')">
    <img src="/assets/dice.png"><br>
    Dice
  </div>

  <div class="card" onclick="openGame('mines')">
    <img src="/assets/mines.png"><br>
    Mines
  </div>

</div>

<div id="game">
  <button onclick="goBack()">⬅ Back</button>
  <div id="content"></div>
</div>

<script>
const API = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

async function loadBalance() {
  const res = await fetch(API + "/user/" + userId);
  const data = await res.json();
  document.getElementById("balance").innerText =
    "€" + data.balanceUSD.toFixed(2);
}

function openGame(name) {
  document.getElementById("home").style.display = "none";
  document.getElementById("game").style.display = "block";

  if (name === "dice") renderDice();
  if (name === "mines") renderMines();
}

function goBack() {
  document.getElementById("home").style.display = "grid";
  document.getElementById("game").style.display = "none";
}

function renderDice() {
  document.getElementById("content").innerHTML = `
    <h2>🎲 Dice</h2>
    <input id="bet" placeholder="Bet €">
    <br>
    <input type="range" min="1" max="95" value="50" id="chance">
    <span id="chanceVal">50</span>%
    <br><br>
    <button onclick="rollDice()">Roll</button>
    <h3 id="diceResult"></h3>
  `;

  const slider = document.getElementById("chance");
  slider.oninput = () => {
    document.getElementById("chanceVal").innerText = slider.value;
  };
}

async function rollDice() {
  const bet = Number(document.getElementById("bet").value);
  const chance = Number(document.getElementById("chance").value);
  const resultEl = document.getElementById("diceResult");

  let fake = setInterval(() => {
    resultEl.innerText = (Math.random()*100).toFixed(2);
  }, 40);

  const res = await fetch(API + "/dice", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id:userId, bet, chance })
  });

  const data = await res.json();
  clearInterval(fake);

  resultEl.innerText =
    data.roll + (data.win ? " 🔥 WIN" : " 💀 LOSE");

  loadBalance();
}

let gameActive = false;

function renderMines() {
  document.getElementById("content").innerHTML = `
    <h2>💣 Mines</h2>
    <input id="betM" placeholder="Bet €">
    <input id="mines" placeholder="Mines (1-24)">
    <br>
    <button onclick="startMines()">Start</button>
    <button onclick="cashout()">Cashout</button>
    <div id="grid"></div>
  `;
}

async function startMines() {
  const bet = Number(document.getElementById("betM").value);
  const mines = Number(document.getElementById("mines").value);

  await fetch(API + "/mines/start", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id:userId, bet, mines })
  });

  gameActive = true;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i=0;i<25;i++) {
    const tile = document.createElement("div");
    tile.className="tile";
    tile.onclick=()=>clickTile(i,tile);
    grid.appendChild(tile);
  }
}

async function clickTile(i, el) {
  if (!gameActive) return;

  const res = await fetch(API + "/mines/click", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id:userId, tile:i })
  });

  const data = await res.json();

  if (data.lose) {
    el.innerHTML = `<img src="/assets/bomb.png">`;
    gameActive = false;

    data.mines.forEach(idx => {
      document.getElementsByClassName("tile")[idx].innerHTML =
        `<img src="/assets/bomb.png">`;
    });

  } else {
    el.innerHTML = `<img src="/assets/gem.png">`;
  }
}

async function cashout() {
  await fetch(API + "/mines/cashout", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id:userId })
  });

  gameActive = false;
  loadBalance();
}

loadBalance();
</script>

</body>
</html>
