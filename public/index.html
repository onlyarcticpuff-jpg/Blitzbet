<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlitzBet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#0f1220,#1a1f3a,#2b1f4a);
  color:white;
}

.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:10px 15px;
  border-radius:12px;
}

.toggle {
  margin-left:10px;
  cursor:pointer;
  opacity:0.7;
}

.active { opacity:1; }

.card {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:25px;
  text-align:center;
  margin:20px;
}

button {
  background: linear-gradient(135deg,#6c5ce7,#a29bfe);
  border:none;
  padding:12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.bet-controls {
  display:flex;
  gap:10px;
  justify-content:center;
  margin:10px 0;
}

.bar {
  height:20px;
  background: linear-gradient(to right,#ff3b3b,#2ecc71);
  border-radius:10px;
  position:relative;
  margin:20px 0;
}

.pointer {
  position:absolute;
  width:4px;
  height:30px;
  background:white;
  top:-5px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(5,60px);
  gap:10px;
  justify-content:center;
}

.tile {
  width:60px;
  height:60px;
  background:#1a1d26;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.glow {
  box-shadow:0 0 20px #a29bfe;
}
</style>
</head>

<body>

<div class="topbar">
  <b>⚡ BlitzBet</b>
  <div>
    <span id="balance">€0</span>
    <span class="toggle active" onclick="setCurrency('eur')" id="eur">€</span>
    <span class="toggle" onclick="setCurrency('sol')" id="sol">SOL</span>
  </div>
</div>

<div id="home">
  <div class="card" onclick="openGame('dice')">🎲 Dice</div>
  <div class="card" onclick="openGame('mines')">💣 Mines</div>
</div>

<div id="game" style="display:none">
  <button onclick="goBack()">Back</button>
  <div id="content"></div>
</div>

<audio id="mineSound" src="/assets/sounds/mine.mp3"></audio>
<audio id="gemSound" src="/assets/sounds/gem.mp3"></audio>
<audio id="diceSound" src="/assets/sounds/dice.mp3"></audio>

<script>
const API = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

let balanceUSD = 0;
let solPrice = 150;
let currency = "eur";
let bet = 10;

function format(val){
  return currency==="eur" ? "€"+val.toFixed(2) : (val/solPrice).toFixed(4)+" SOL";
}

function setCurrency(c){
  currency=c;
  eur.classList.toggle("active",c==="eur");
  sol.classList.toggle("active",c==="sol");
  updateUI();
}

async function load(){
  const res = await fetch(API+"/user/"+userId);
  const data = await res.json();
  balanceUSD = data.balanceUSD;
  updateUI();
}

function updateUI(){
  balance.innerText = format(balanceUSD);
}

function openGame(g){
  home.style.display="none";
  game.style.display="block";
  if(g==="dice") diceUI();
  if(g==="mines") minesUI();
}

function goBack(){
  game.style.display="none";
  home.style.display="block";
}

/* 🎲 DICE */
function diceUI(){
  content.innerHTML = `
    <h2>Dice</h2>

    <div class="bet-controls">
      <button onclick="bet/=2">½</button>
      <button onclick="bet*=2">2x</button>
    </div>

    <div class="bar"><div id="pointer" class="pointer"></div></div>

    <button onclick="roll()">Roll</button>
    <h3 id="res"></h3>
  `;
}

async function roll(){
  play("diceSound");

  let p = document.getElementById("pointer");

  let i = setInterval(()=>{
    p.style.left = Math.random()*100+"%";
  },30);

  const r = await fetch(API+"/dice",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId,bet})
  });

  const d = await r.json();

  clearInterval(i);
  p.style.left = d.roll+"%";

  if(d.win){
    res.innerText="WIN";
    res.classList.add("glow");
  } else res.innerText="LOSE";

  load();
}

/* 💣 MINES */
function minesUI(){
  content.innerHTML=`
    <h2>Mines</h2>

    <div class="bet-controls">
      <button onclick="bet/=2">½</button>
      <button onclick="bet*=2">2x</button>
    </div>

    <button onclick="start()">Start</button>
    <button onclick="cash()">Cashout</button>

    <div class="grid" id="grid"></div>
  `;

  for(let i=0;i<25;i++){
    let d=document.createElement("div");
    d.className="tile";
    d.onclick=()=>clickTile(i,d);
    grid.appendChild(d);
  }
}

async function start(){
  await fetch(API+"/mines/start",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:userId,bet,mines:5})});
}

async function clickTile(i,el){
  const r = await fetch(API+"/mines/click",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId,tile:i})
  });

  const d = await r.json();

  if(d.lose){
    play("mineSound");
    el.innerHTML="💣";
  } else {
    play("gemSound");
    el.innerHTML="💎";
  }
}

async function cash(){
  await fetch(API+"/mines/cashout",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:userId})});
  load();
}

function play(id){
  let s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

load();
</script>

</body>
</html>
