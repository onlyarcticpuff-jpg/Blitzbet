<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlitzBet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #1a1d2e, #0b0d16);
  color:white;
}

.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance-box {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  padding:10px 15px;
  border-radius:12px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:25px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover { transform:scale(1.05); }

#game { display:none; padding:20px; }

button {
  border:none;
  border-radius:10px;
  padding:10px 15px;
  background: linear-gradient(135deg,#6c5ce7,#a29bfe);
  color:white;
  cursor:pointer;
}

.bet-box {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.bet-display {
  background: rgba(255,255,255,0.05);
  padding:10px 20px;
  border-radius:10px;
}

.bar {
  position:relative;
  height:20px;
  background:#1a1d26;
  border-radius:10px;
  margin:20px 0;
  overflow:hidden;
}

.pointer {
  position:absolute;
  top:-5px;
  width:4px;
  height:30px;
  background:white;
}

#grid {
  display:grid;
  grid-template-columns:repeat(5,60px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.tile {
  width:60px;
  height:60px;
  background:#1a1d26;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.1s;
}

.tile:active { transform:scale(0.9); }

img { width:30px; }

.slider { width:100%; }
</style>
</head>

<body>

<div class="topbar">
  <b>⚡ BlitzBet</b>
  <div class="balance-box" id="balance">€0.00</div>
</div>

<div id="home" class="grid">
  <div class="card" onclick="openGame('dice')">
    <img src="/assets/dice.png"><br>Dice
  </div>

  <div class="card" onclick="openGame('mines')">
    <img src="/assets/mines.png"><br>Mines
  </div>
</div>

<div id="game">
  <button onclick="goBack()">⬅ Back</button>
  <div id="content"></div>
</div>

<!-- 🔊 SOUNDS -->
<audio id="mineSound" src="/assets/sounds/mine.mp3"></audio>
<audio id="gemSound" src="/assets/sounds/gem.mp3"></audio>
<audio id="diceSound" src="/assets/sounds/dice.mp3"></audio>

<script>
const API = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

let balance = 0;
let bet = 10;
let active = false;

/* 🔊 SOUND HANDLER */
function playSound(id){
  const s = document.getElementById(id);
  s.currentTime = 0;
  s.play();
}

/* BALANCE */
async function loadBalance(){
  const res = await fetch(API+"/user/"+userId);
  const data = await res.json();
  balance = data.balanceUSD;
  balanceEl.innerText = "€"+balance.toFixed(2);
}

/* NAV */
function openGame(name){
  home.style.display="none";
  game.style.display="block";

  if(name==="dice") renderDice();
  if(name==="mines") renderMines();
}

function goBack(){
  home.style.display="grid";
  game.style.display="none";
}

/* BET UI */
function betUI(){
  return `
    <div class="bet-box">
      <button onclick="bet-=1;updateBet()">-</button>
      <div class="bet-display" id="betVal">€${bet}</div>
      <button onclick="bet+=1;updateBet()">+</button>
      <button onclick="bet=balance;updateBet()">MAX</button>
    </div>
  `;
}

function updateBet(){
  if(bet<1) bet=1;
  document.getElementById("betVal").innerText="€"+bet.toFixed(2);
}

/* 🎲 DICE */
function renderDice(){
  content.innerHTML=`
    <h2>🎲 Dice</h2>
    ${betUI()}

    <input type="range" min="1" max="95" value="50" id="chance" class="slider">
    <div id="chanceVal">50%</div>

    <div class="bar">
      <div class="pointer" id="pointer"></div>
    </div>

    <button onclick="rollDice()">Roll</button>
    <h3 id="result"></h3>
  `;

  chance.oninput=()=> chanceVal.innerText=chance.value+"%";
}

async function rollDice(){
  const pointer=document.getElementById("pointer");
  const result=document.getElementById("result");

  playSound("diceSound");

  let speed=50;
  let pos=0;

  const anim=setInterval(()=>{
    pos=Math.random()*100;
    pointer.style.left=pos+"%";
  },20);

  const res=await fetch(API+"/dice",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId,bet,chance:chance.value})
  });

  const data=await res.json();

  clearInterval(anim);

  pointer.style.left=data.roll+"%";

  result.innerText =
    data.roll + (data.win ? " 🔥 WIN":" 💀 LOSE");

  loadBalance();
}

/* 💣 MINES */
function renderMines(){
  content.innerHTML=`
    <h2>💣 Mines</h2>
    ${betUI()}

    <input type="range" min="1" max="24" value="5" id="minesSlider" class="slider">
    <div id="minesVal">5 mines</div>

    <button onclick="startMines()">Start</button>
    <button onclick="cashout()">Cashout</button>

    <div id="grid"></div>
  `;

  minesSlider.oninput=()=> minesVal.innerText=minesSlider.value+" mines";

  createGrid();
}

function createGrid(){
  grid.innerHTML="";
  for(let i=0;i<25;i++){
    let tile=document.createElement("div");
    tile.className="tile";
    tile.onclick=()=>clickTile(i,tile);
    grid.appendChild(tile);
  }
}

async function startMines(){
  await fetch(API+"/mines/start",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId,bet,mines:minesSlider.value})
  });

  active=true;
}

async function clickTile(i,el){
  if(!active) return;

  el.style.transform="scale(0.9)";
  setTimeout(()=>el.style.transform="scale(1)",100);

  const res=await fetch(API+"/mines/click",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId,tile:i})
  });

  const data=await res.json();

  if(data.lose){
    playSound("mineSound");

    el.innerHTML=`<img src="/assets/bomb.png">`;
    active=false;

    data.mines.forEach(idx=>{
      document.getElementsByClassName("tile")[idx].innerHTML=
      `<img src="/assets/bomb.png">`;
    });

  } else {
    playSound("gemSound");
    el.innerHTML=`<img src="/assets/gem.png">`;
  }
}

async function cashout(){
  await fetch(API+"/mines/cashout",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:userId})
  });

  active=false;
  loadBalance();
}

loadBalance();
</script>

</body>
</html>
