<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlitzBet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --surface:  #161b27;
  --surface2: #1c2333;
  --surface3: #222840;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.10);
  --text:     #e6edf3;
  --muted:    #7d8590;
  --accent:   #3b82f6;
  --accent-h: #2563eb;
  --win:      #22c55e;
  --lose:     #ef4444;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── TOPBAR ─── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }

.balance-wrap { display: flex; align-items: center; gap: 8px; }

.currency-tabs {
  display: flex; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 3px; gap: 2px;
}
.currency-tabs .toggle {
  cursor: pointer; padding: 4px 12px; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  transition: all 0.15s; user-select: none;
}
.currency-tabs .toggle.active { background: var(--surface3); color: var(--text); }

.balance-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  padding: 7px 14px; border-radius: 10px;
}
.bal-icon {
  width: 22px; height: 22px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.bal-amount {
  font-family: 'DM Mono', monospace;
  font-size: 14px; font-weight: 500; color: var(--text);
}
@keyframes balFlash {
  0%   { color: var(--win); }
  100% { color: var(--text); }
}
.bal-flash { animation: balFlash 0.7s ease-out forwards; }

/* ─── HOME ─── */
#home {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; padding: 32px 24px;
  max-width: 700px; margin: 0 auto;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px 20px; text-align: center;
  cursor: pointer; transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.07) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.2s;
}
.card:hover { transform: translateY(-4px); border-color: var(--border2); box-shadow: 0 12px 32px rgba(0,0,0,0.35); }
.card:hover::before { opacity: 1; }
.card-icon {
  width: 56px; height: 56px; margin: 0 auto 16px;
  background: var(--surface2); border-radius: 14px;
  display: flex; align-items: center; justify-content: center; padding: 12px;
}
.card-icon img { width: 32px; height: 32px; object-fit: contain; }
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card p { font-size: 12px; color: var(--muted); }

/* ─── GAME WRAPPER ─── */
#game { display: none; padding: 24px; max-width: 820px; margin: 0 auto; }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 7px 14px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; transition: color 0.15s, border-color 0.15s; margin-bottom: 20px;
}
.back-btn:hover { color: var(--text); border-color: var(--border2); }
.back-btn svg { width: 14px; height: 14px; }

/* ─── PANELS ─── */
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 12px;
}
.panel-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 14px;
}

/* ─── BET INPUT ─── */
.bet-input-row {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px 4px 4px 14px; margin-top: 6px;
}
.bet-label {
  font-family: 'DM Mono', monospace;
  font-size: 15px; font-weight: 500; flex: 1; color: var(--text);
}
.bet-modifiers { display: flex; gap: 4px; }
.bet-mod {
  background: var(--surface3); border: none; border-radius: 7px;
  padding: 6px 11px; cursor: pointer; color: var(--muted);
  font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  transition: color 0.15s, background 0.15s;
}
.bet-mod:hover { background: var(--border2); color: var(--text); }

/* ─── RANGE ─── */
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 4px;
  border-radius: 4px; background: var(--surface3);
  outline: none; margin: 10px 0 16px; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
  transition: box-shadow 0.15s; cursor: grab;
}
input[type="range"]::-webkit-slider-thumb:active {
  cursor: grabbing; box-shadow: 0 0 0 5px rgba(59,130,246,0.3);
}

/* ─── DICE ─── */
.dice-stats { display: flex; gap: 10px; margin-bottom: 18px; }
.stat-pill {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; text-align: center;
}
.stat-pill .stat-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px;
}
.stat-pill .stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 18px; font-weight: 500; color: var(--text);
}

.dice-bar-wrap { position: relative; margin: 4px 0 10px; }
.bar { height: 12px; border-radius: 8px; overflow: hidden; position: relative; }
.bar-track { position: absolute; inset: 0; transition: background 0.12s; }

/* Pointer — NO transition, snaps directly to result */
.pointer {
  position: absolute; top: -9px;
  width: 4px; height: 30px;
  background: #fff; border-radius: 4px;
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
  transform: translateX(-50%);
}

/* Dice result toast */
.dice-toast {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: 10px;
  font-weight: 600; font-size: 14px; margin-top: 12px;
}
.dice-toast.win  { background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.25); color: var(--win); }
.dice-toast.lose { background: rgba(239,68,68,0.09); border: 1px solid rgba(239,68,68,0.2);  color: var(--lose); }

/* ─── MINES ─── */
.mines-layout {
  display: grid; grid-template-columns: 1fr 224px;
  gap: 12px; align-items: start;
}
@media (max-width: 600px) { .mines-layout { grid-template-columns: 1fr; } }

#grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }

.tile {
  aspect-ratio: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, background 0.15s, border-color 0.15s;
  user-select: none;
}
.tile:hover  { background: var(--surface3); border-color: var(--border2); }
.tile:active { transform: scale(0.91); }
.tile img { width: 32px; height: 32px; object-fit: contain; }
  .tile.loading {
  background: var(--surface3);
  transform: scale(0.92);
}

.tile.loading::after {
  content: '';
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top: 2px solid #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.tile.reveal {
  animation: pop 0.18s ease-out;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes pop {
  0% { transform: scale(0.7); opacity: 0.6; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.mines-controls { display: flex; flex-direction: column; gap: 12px; }
.mines-slider-row {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 2px;
}
.mines-slider-row span { font-size: 13px; color: var(--muted); }
.mines-slider-row strong { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text); }

/* ─── BUTTONS ─── */
.btn-primary {
  width: 100%; padding: 13px; background: var(--accent);
  border: none; border-radius: 10px; color: #fff;
  font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-primary:hover { background: var(--accent-h); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.55; cursor: default; }

.btn-win {
  width: 100%; padding: 13px;
  background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
  border-radius: 10px; color: var(--win);
  font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-win:hover  { background: rgba(34,197,94,0.2); }
.btn-win:active { transform: scale(0.98); }

/* ─── MINES IN-PROGRESS INDICATOR ─── */
.btn-in-progress {
  width: 100%; padding: 13px;
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.18);
  border-radius: 10px;
  color: rgba(239,68,68,0.5);
  font-size: 12px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-align: center; padding: 13px;
  filter: blur(0.3px);
  pointer-events: none; user-select: none;
}

/* ─── CASHOUT / RESULT BOX ─── */
.cashout-box {
  background: rgba(34,197,94,0.07);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 12px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.co-row { display: flex; justify-content: space-between; align-items: center; }
.co-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
.co-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 600; color: var(--win); }
.co-divider { height: 1px; background: rgba(34,197,94,0.12); margin: 2px 0; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Blitz<span>Bet</span></div>
  <div class="balance-wrap">
    <div class="currency-tabs">
      <span class="toggle active" onclick="setCurrency('eur')">€</span>
      <span class="toggle" onclick="setCurrency('sol')">SOL</span>
    </div>
    <div class="balance-chip">
      <div class="bal-icon">$</div>
      <span class="bal-amount" id="balance">€0.00</span>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="home" style="display:grid;">
  <div class="card" onclick="openGame('dice')">
    <div class="card-icon"><img src="/assets/dice.png" alt="Dice"></div>
    <h3>Dice</h3>
    <p>Classic provably fair dice</p>
  </div>
  <div class="card" onclick="openGame('mines')">
    <div class="card-icon"><img src="/assets/mines.png" alt="Mines"></div>
    <h3>Mines</h3>
    <p>Find the gems, avoid bombs</p>
  </div>
</div>

<!-- GAME VIEW -->
<div id="game">
  <button class="back-btn" onclick="goBack()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
    Back
  </button>
  <div id="content"></div>
</div>

<!-- Audio -->
<audio id="mineSound" src="/assets/sounds/mine.mp3"></audio>
<audio id="gemSound"  src="/assets/sounds/gem.mp3"></audio>
<audio id="diceSound" src="/assets/sounds/dice.mp3"></audio>

<script>
const API    = "https://blit-production.up.railway.app";
const userId = Number(new URLSearchParams(location.search).get("id"));

let balance  = 0;
let currency = "eur";
let bet      = 10;
let active   = false;

/* ── SOUND ── */
function play(id) {
  let s = document.getElementById(id);
  s.currentTime = 0;
  s.play();
}

/* ── BALANCE ── */
const balanceEl = document.getElementById('balance');

async function loadBalance() {
  let r = await fetch(API + "/user/" + userId);
  let d = await r.json();
  balance = d.balanceUSD;
  updateBalance(true);
}

function updateBalance(flash) {
  balanceEl.innerText = currency === "eur"
    ? "€" + balance.toFixed(2)
    : (balance / 150).toFixed(3) + " SOL";

  if (flash) {
    balanceEl.classList.remove('bal-flash');
    void balanceEl.offsetWidth;
    balanceEl.classList.add('bal-flash');
  }
}

function setCurrency(c) {
  currency = c;
  document.querySelectorAll(".toggle").forEach(e => e.classList.remove("active"));
  event.target.classList.add("active");
  updateBalance(false);
}

/* ── NAV ── */
function openGame(name) {
  home.style.display = "none";
  game.style.display = "block";
  if (name === "dice")  renderDice();
  if (name === "mines") renderMines();
}

function goBack() {
  home.style.display = "grid";
  game.style.display = "none";
}

/* ── BET ── */
function betUI() {
  return `
    <div class="panel">
      <div class="panel-title">Bet Amount</div>
      <div class="bet-input-row">
        <span class="bet-label" id="betVal">€${bet.toFixed(2)}</span>
        <div class="bet-modifiers">
          <button class="bet-mod" onclick="bet/=2;updateBet()">½</button>
          <button class="bet-mod" onclick="bet*=2;updateBet()">2×</button>
          <button class="bet-mod" onclick="bet=balance;updateBet()">MAX</button>
        </div>
      </div>
    </div>
  `;
}

function updateBet() {
  if (bet < 1) bet = 1;
  betVal.innerText = "€" + bet.toFixed(2);
}

/* ════════════════════════════════
   DICE
════════════════════════════════ */
function renderDice() {
  content.innerHTML = `
    <div class="panel">
      <div class="panel-title">Dice</div>

      <div class="dice-stats">
        <div class="stat-pill">
          <div class="stat-label">Win Chance</div>
          <div class="stat-val" id="chanceVal">50%</div>
        </div>
        <div class="stat-pill">
          <div class="stat-label">Roll Result</div>
          <div class="stat-val" id="rollVal">—</div>
        </div>
      </div>

      <input type="range" min="1" max="95" value="50" id="chance">

      <div class="dice-bar-wrap">
        <div class="bar">
          <div class="bar-track" id="barTrack"></div>
          <div class="pointer" id="pointer" style="left:50%"></div>
        </div>
      </div>

      <div id="diceResultBox"></div>
    </div>
    ${betUI()}
    <button class="btn-primary" id="diceBetBtn" onclick="rollDice()">Place Bet</button>
  `;

  setDiceBar(50);

  chance.oninput = () => {
    const v = Number(chance.value);
    chanceVal.innerText = v + "%";
    setDiceBar(v);
  };
}

/*
  Bar color logic:
  - Slider sets the WIN threshold (roll must be BELOW this to win)
  - LEFT side (0 → chance%) = GREEN  (winning zone)
  - RIGHT side (chance% → 100) = RED (losing zone)
  Pointer lands on the actual roll value.
*/
function setDiceBar(pct) {
  barTrack.style.background =
    `linear-gradient(to right, var(--win) ${pct}%, var(--lose) ${pct}%)`;
}

async function rollDice() {
  play("diceSound");

  const btn = document.getElementById('diceBetBtn');
  btn.disabled = true;
  btn.textContent = "Rolling…";

  const res = await fetch(API + "/dice", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, bet, chance: chance.value })
  });

  const d = await res.json();

  /* Snap pointer directly to result — no scramble */
  pointer.style.left = d.roll + "%";
  rollVal.innerText  = d.roll;

  const won = d.win;
  diceResultBox.innerHTML = `
    <div class="dice-toast ${won ? 'win' : 'lose'}">
      <span>${won ? '✓' : '✕'}</span>
      <span>Rolled ${d.roll} — ${won ? 'You Win!' : 'You Lose'}</span>
    </div>`;

  /* Update balance instantly if server returns it, else fetch */
  if (d.balance !== undefined) {
    balance = d.balance;
    updateBalance(true);
  } else {
    loadBalance();
  }

  btn.disabled = false;
  btn.textContent = "Place Bet";
}

/* ════════════════════════════════
   MINES
════════════════════════════════ */
let gemsFound  = 0;
let sessionBet = 0;

function renderMines() {
  content.innerHTML = `
    <div class="mines-layout">
      <div>
        <div id="grid"></div>
      </div>
      <div class="mines-controls">
        ${betUI()}
        <div class="panel">
          <div class="panel-title">Mines</div>
          <div class="mines-slider-row">
            <span>Count</span>
            <strong id="mVal">5</strong>
          </div>
          <input type="range" min="1" max="24" value="5" id="m" style="margin-bottom:0">
        </div>
        <div id="startBtnWrap">
          <button class="btn-primary" onclick="startMines()">Start Game</button>
        </div>
        <button class="btn-win" onclick="cashout()">Cash Out</button>
        <div id="cashoutResultBox"></div>
      </div>
    </div>
  `;

  m.oninput = () => mVal.innerText = m.value;
  createGrid();
}

function createGrid() {
  grid.innerHTML = "";
  for (let i = 0; i < 25; i++) {
    let t = document.createElement("div");
    t.className = "tile";
    t.onclick = () => clickTile(i, t);
    grid.appendChild(t);
  }
}

async function startMines() {
  await fetch(API + "/mines/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, bet, mines: m.value })
  });
  active     = true;
  gemsFound  = 0;
  sessionBet = bet;

  cashoutResultBox.innerHTML = "";
  startBtnWrap.innerHTML = `<div class="btn-in-progress">⬤&nbsp;&nbsp;Game In Progress</div>`;
  createGrid();
}

async function clickTile(i, el) {
  if (!active) return;

  const res = await fetch(API + "/mines/click", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId, tile: i })
  });

  const d = await res.json();

  if (d.lose) {
    play("mineSound");
    el.innerHTML = `<img src="/assets/bomb.png">`;
    active = false;

    startBtnWrap.innerHTML = `<button class="btn-primary" onclick="startMines()">Start Game</button>`;
    cashoutResultBox.innerHTML = `
      <div class="dice-toast lose" style="margin-top:0">
        <span>✕</span><span>Bomb hit — game over</span>
      </div>`;

    if (d.balance !== undefined) { balance = d.balance; updateBalance(true); }
    else loadBalance();

  } else {
    play("gemSound");
    el.innerHTML = `<img src="/assets/gem.png">`;
    gemsFound++;

    /* Show running gem count + multiplier if server returns it */
    const mult = d.multiplier !== undefined ? Number(d.multiplier) : null;
    let html = `<div class="cashout-box">
      <div class="co-row"><span class="co-label">Gems found</span><span class="co-val">${gemsFound}</span></div>`;
    if (mult !== null) {
      html += `<div class="co-divider"></div>
      <div class="co-row"><span class="co-label">Multiplier</span><span class="co-val">${mult.toFixed(2)}×</span></div>
      <div class="co-row"><span class="co-label">Potential payout</span><span class="co-val">€${(sessionBet * mult).toFixed(2)}</span></div>`;
    }
    html += `</div>`;
    cashoutResultBox.innerHTML = html;
  }
}

async function cashout() {
  const res = await fetch(API + "/mines/cashout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: userId })
  });

  const d = await res.json();
  active = false;

  startBtnWrap.innerHTML = `<button class="btn-primary" onclick="startMines()">Start Game</button>`;

  const mult   = d.multiplier !== undefined ? Number(d.multiplier) : null;
  const payout = d.payout     !== undefined
    ? Number(d.payout)
    : (mult !== null ? sessionBet * mult : null);

  let html = `<div class="cashout-box">
    <div class="co-row"><span class="co-label">Gems found</span><span class="co-val">${gemsFound}</span></div>`;
  if (mult !== null) {
    html += `<div class="co-divider"></div>
    <div class="co-row"><span class="co-label">Multiplier</span><span class="co-val">${mult.toFixed(2)}×</span></div>`;
  }
  if (payout !== null) {
    html += `<div class="co-divider"></div>
    <div class="co-row"><span class="co-label">Payout</span><span class="co-val">€${payout.toFixed(2)}</span></div>`;
  }
  html += `</div>`;
  cashoutResultBox.innerHTML = html;

  if (d.balance !== undefined) { balance = d.balance; updateBalance(true); }
  else loadBalance();
}

loadBalance();
</script>
</body>
</html>
